name: Build Site

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "campaigns/**"
      - "logs/**"
      - "tools/**"
      - "assets/**"
      - "package.json"
      - "vercel.json"
      - ".github/workflows/build-site.yml"
  pull_request:
    branches: [main]
    paths:
      - "content/**"
      - "campaigns/**"
      - "logs/**"
      - "tools/**"
      - "assets/**"
      - "package.json"
      - "vercel.json"
      - ".github/workflows/build-site.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build site
        run: npm run build

      - name: Commit generated site
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain campaigns logs)" ]; then
            git config user.name "spacebar-bot"
            git config user.email "spacebar-bot@users.noreply.github.com"
            git add campaigns/ logs/
            git commit -m "Build site"
            git push
          else
            echo "No generated site changes."
          fi

      - name: Check generated site is current
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain campaigns logs)" ]; then
            echo "Generated site changed after npm run build."
            echo "Run npm run build locally or merge to main and let GitHub Actions generate it."
            git status --short campaigns logs
            exit 1
          fi
