name: Build Site

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "campaigns/**"
      - "logs/**"
      - "tools/**"
      - "assets/**"
      - "package.json"
      - "vercel.json"
      - ".github/workflows/build-site.yml"
  pull_request:
    branches: [main]
    paths:
      - "content/**"
      - "campaigns/**"
      - "logs/**"
      - "tools/**"
      - "assets/**"
      - "package.json"
      - "vercel.json"
      - ".github/workflows/build-site.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build site
        run: npm run build
